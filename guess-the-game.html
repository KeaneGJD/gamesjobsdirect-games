<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Game</title>

<style>
:root{
    --primary:#553179;
    --accent:#bedc00;
    --bg:#eae8e5;
    --card:#ffffff;
    --text:#1a1a1a;

    --grey:#d0d0d0;
    --green:#2ecc71;
    --red:#e74c3c;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    background:white;
    padding:10px 15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:2px solid #ddd;
}

header img{
    height:38px;
}

/* HUB BUTTON */
.hub-btn{
    background:var(--primary);
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

/* LAYOUT */
.wrapper{
    display:flex;
    max-width:1100px;
    margin:auto;
    padding:20px;
    gap:20px;
}

/* SIDEBAR */
.sidebar{
    width:60px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.dot{
    width:44px;
    height:44px;
    border-radius:8px;
    background:var(--grey);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    cursor:pointer;
}

.dot.current{ background:var(--primary); color:white; }
.dot.correct{ background:var(--green); color:white; }
.dot.wrong{ background:var(--red); color:white; }

/* MAIN */
.main{ flex:1; }

/* MENU */
.menu{
    text-align:center;
    margin-top:30px;
}

/* BIGGER TITLE */
.title{
    line-height:1;
    margin-bottom:20px;
}

.title-top{
    font-size:56px;
    font-weight:900;
}

.title-top span{
    color:var(--primary);
}

.title-bottom{
    font-size:96px;
    font-weight:900;
    color:var(--accent);
}

/* DIFFICULTY */
.diff-row{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
}

.diff{
    background:white;
    border:2px solid var(--primary);
    padding:8px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
}

.diff.active{
    background:var(--primary);
    color:white;
}

.diff-info{
    margin-top:10px;
    font-size:14px;
    opacity:0.7;
}

/* START BUTTON BIG */
.start-btn{
    margin-top:25px;
    padding:18px 44px;
    font-size:22px;
    border:none;
    border-radius:14px;
    background:var(--accent);
    cursor:pointer;
    font-weight:900;
}

/* GAME */
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    display:none;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:10px;
}

.timer{
    font-weight:bold;
}

/* EMOJI */
.emoji{
    font-size:78px;
    text-align:center;
    margin:25px 0;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* BUTTONS */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:12px;
    font-weight:bold;
    cursor:pointer;
}

.submit{ background:var(--accent); }
.skip{ background:#999; color:white; }
.back{ background:#ddd; }

/* CLUE */
.clue{
    display:none;
    margin-top:15px;
    background:#f4f4f4;
    padding:10px;
    border-radius:8px;
    font-size:14px;
}

/* SPACING FIX */
.spacer{
    height:14px;
}

/* END SCREEN */
.end{
    text-align:center;
}

.big{
    font-size:52px;
    font-weight:900;
    margin-bottom:10px;
}

.big-score{
    font-size:30px;
    margin-bottom:20px;
}

/* ACTION BUTTONS */
.action-btn{
    padding:14px 18px;
    border-radius:10px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
}

.primary{ background:var(--accent); }
.secondary{ background:var(--primary); color:white; }

/* REVEALED ANSWERS */
.answers{
    margin-top:20px;
    text-align:left;
    max-width:400px;
    margin-left:auto;
    margin-right:auto;
}

.answer-row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid #eee;
    font-size:14px;
}

</style>
</head>

<body>

<header>
    <img src="https://www.gamesjobsdirect.com/assets/img/default-logo.svg">

    <button class="hub-btn" onclick="goHub()">Game Hub</button>
</header>

<!-- MENU -->
<div class="menu" id="menu">

    <div class="title">
        <div class="title-top"><span>Guess The</span></div>
        <div class="title-bottom">Game</div>
    </div>

    <div class="diff-row">
        <div class="diff active" onclick="setDiff('easy',this)">Easy</div>
        <div class="diff" onclick="setDiff('normal',this)">Normal</div>
        <div class="diff" onclick="setDiff('hard',this)">Hard</div>
    </div>

    <div class="diff-info" id="info">No timer – relaxed play</div>

    <button class="start-btn" onclick="start()">START GAME</button>
</div>

<!-- GAME -->
<div class="wrapper">

<div class="sidebar" id="sidebar"></div>

<div class="main">

<div class="card" id="game">

<div class="topbar">
    <div id="progress"></div>
    <div class="timer" id="timer"></div>
</div>

<div class="emoji" id="emoji"></div>

<button class="btn secondary" onclick="toggleClue()">Reveal Clue</button>

<div class="clue" id="clue"></div>

<div class="spacer"></div>

<input id="input" placeholder="Type your guess">

<button class="btn submit" onclick="submit()">Submit</button>
<button class="btn skip" onclick="skip()">Skip</button>
<button class="btn back" onclick="back()">Back</button>

</div>

<div id="end" class="end" style="display:none;"></div>

</div>
</div>

<script>

const ALL=[
{emoji:"🍄👨‍🔧🏰", answer:["super mario bros","mario bros"], clue:"Plumber rescues princess", year:"1985"},
{emoji:"🧱⛏️🌍", answer:["minecraft"], clue:"Build and survive", year:"2011"},
{emoji:"🧟‍♂️🔫🏚️", answer:["resident evil"], clue:"Zombie mansion outbreak", year:"1996"},
{emoji:"⚔️🐉👑", answer:["skyrim"], clue:"Dragonborn rises", year:"2011"},
{emoji:"🔫🪖🌍", answer:["call of duty"], clue:"Military FPS series", year:"2003"},
{emoji:"🎯🔫📦", answer:["fortnite"], clue:"Battle royale builder", year:"2017"},
{emoji:"🪐👽🔫", answer:["halo","halo combat evolved"], clue:"Master Chief vs Covenant", year:"2001"}
];

let q=[], i=0, score=0, status=[], diff="easy", timer, timeLeft;

/* HUB */
function goHub(){
window.location.href="index.html";
}

/* DIFF */
function setDiff(d,el){
diff=d;
document.querySelectorAll(".diff").forEach(x=>x.classList.remove("active"));
el.classList.add("active");

const info={
easy:"No timer – relaxed play",
normal:"1 minute total game time",
hard:"30 seconds total game time"
};

document.getElementById("info").innerText=info[d];
}

/* START */
function start(){

q=[...ALL].sort(()=>Math.random()-0.5).slice(0,10);
i=0; score=0;
status=Array(q.length).fill("pending");

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

buildSidebar();
load();
startTimer();
}

/* SIDEBAR */
function buildSidebar(){
let s=document.getElementById("sidebar");
s.innerHTML="";

q.forEach((_,idx)=>{
let d=document.createElement("div");
d.className="dot";
d.innerText=idx+1;
d.onclick=()=>go(idx);
s.appendChild(d);
});

updateSidebar();
}

function updateSidebar(){
document.querySelectorAll(".dot").forEach((d,idx)=>{

d.className="dot";

if(idx===i) d.classList.add("current");
if(status[idx]==="correct") d.classList.add("correct");
if(status[idx]==="wrong") d.classList.add("wrong");

});
}

/* LOAD */
function load(){
if(i>=q.length) return end();

let x=q[i];

document.getElementById("emoji").innerText=x.emoji;
document.getElementById("clue").innerHTML=`<b>${x.year}</b><br>${x.clue}`;
document.getElementById("clue").style.display="none";

document.getElementById("input").value="";
document.getElementById("progress").innerText=`${i+1}/${q.length} | Score: ${score}`;

updateSidebar();
}

/* CLUE */
function toggleClue(){
let c=document.getElementById("clue");
c.style.display=c.style.display==="block"?"none":"block";
}

/* MATCH */
function match(u,arr){
u=u.toLowerCase().trim();
return arr.some(a=>u.includes(a));
}

/* ENTER KEY SUPPORT */
document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
submit();
}
});

/* SUBMIT */
function submit(){
if(match(document.getElementById("input").value,q[i].answer)){
score++;
status[i]="correct";
}else{
status[i]="wrong";
}
next();
}

/* NAV */
function skip(){ next(); }
function back(){ if(i>0) i--; load(); }
function go(x){ i=x; load(); }

/* NEXT */
function next(){
clearInterval(timer);
i++;
load();
startTimer();
}

/* TIMER */
function startTimer(){
clearInterval(timer);

if(diff==="easy") return;

if(i===0){
timeLeft=diff==="normal"?60:30;
}

document.getElementById("timer").innerText=`⏱ ${timeLeft}s`;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText=`⏱ ${timeLeft}s`;

if(timeLeft<=0){
clearInterval(timer);
gameOver();
}

},1000);
}

/* END GAME */
function end(){

document.getElementById("game").style.display="none";

document.getElementById("end").style.display="block";

document.getElementById("end").innerHTML=`
<div class="big">Game Complete 🎉</div>
<div class="big-score">${score}/${q.length}</div>

<button class="action-btn primary" onclick="location.reload()">Play Again</button>
<button class="action-btn secondary" onclick="reveal()">Reveal Answers</button>

<div id="answers" class="answers"></div>
`;
}

/* GAME OVER */
function gameOver(){

document.getElementById("game").style.display="none";

document.getElementById("end").style.display="block";

document.getElementById("end").innerHTML=`
<div class="big">TIME'S UP ⏱</div>
<div class="big-score">${score}/${q.length}</div>

<button class="action-btn primary" onclick="location.reload()">Play Again</button>
<button class="action-btn secondary" onclick="reveal()">Reveal Answers</button>

<div id="answers" class="answers"></div>
`;
}

/* REVEAL (ONE TIME ONLY) */
let revealed=false;

function reveal(){

if(revealed) return;
revealed=true;

let box=document.getElementById("answers");

q.forEach((x,i)=>{
box.innerHTML+=`
<div class="answer-row">
<span>${x.emoji} ${x.answer[0]}</span>
</div>`;
});

}

</script>

</body>
</html>
