<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUESS THE GAME</title>

<style>
:root{
    --primary:#553179;
    --accent:#bedc00;
    --bg:#eae8e5;
    --text:#1a1a1a;
    --grey:#d0d0d0;
    --green:#2ecc71;
    --red:#e74c3c;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    background:white;
    padding:10px 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid #ddd;
}

header img{height:38px;}

.hub-btn{
    background:var(--primary);
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* LAYOUT */
.wrapper{
    display:flex;
    max-width:1100px;
    margin:auto;
    padding:20px;
    gap:20px;
}

.sidebar{
    width:60px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.dot{
    width:44px;
    height:44px;
    border-radius:8px;
    background:var(--grey);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.dot.current{background:var(--primary);color:white;}
.dot.correct{background:var(--green);color:white;}
.dot.wrong{background:var(--red);color:white;}

.main{flex:1;}

/* MENU */
.menu{text-align:center;margin-top:30px;}

.title-top{
    font-size:56px;
    font-weight:900;
}

.title-bottom{
    font-size:96px;
    font-weight:900;
    color:var(--accent);
}

/* DIFF */
.diff-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}

.diff{
    border:2px solid var(--primary);
    background:white;
    padding:8px 14px;
    border-radius:10px;
    cursor:pointer;
}

.diff.active{background:var(--primary);color:white;}

.start-btn{
    margin-top:25px;
    padding:18px 44px;
    font-size:22px;
    background:var(--accent);
    border:none;
    border-radius:14px;
    font-weight:900;
    cursor:pointer;
}

/* GAME */
.card{background:white;padding:20px;border-radius:12px;display:none;}

.emoji{
    font-size:78px;
    text-align:center;
    margin:25px 0;
}

input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ccc;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:12px;
    font-weight:bold;
}

.submit{background:var(--accent);}
.skip{background:#999;color:white;}
.back{background:#ddd;}

.clue{
    display:none;
    margin-top:15px;
    background:#f4f4f4;
    padding:10px;
    border-radius:8px;
}

/* END */
.end{text-align:center;}

.big{font-size:52px;font-weight:900;}
.big-score{font-size:30px;margin:10px 0 20px;}

.action-btn{
    padding:14px 18px;
    border-radius:10px;
    border:none;
    margin:5px;
    font-weight:bold;
}

.primary{background:var(--accent);}
.secondary{background:var(--primary);color:white;}

.answers{
    margin-top:25px;
    text-align:left;
    max-width:600px;
    margin:auto;
}

.answer-card{
    display:flex;
    gap:12px;
    padding:10px;
    background:white;
    margin-bottom:8px;
    border-radius:10px;
    font-size:18px;
}

.answer-emoji{font-size:28px;}
</style>
</head>

<body>

<header>
<a href="https://www.gamesjobsdirect.com/">
<img src="https://www.gamesjobsdirect.com/assets/img/default-logo.svg">
</a>

<button class="hub-btn" onclick="goHub()">Return to Game Hub</button>
</header>

<div class="menu" id="menu">

<div class="title-top">GUESS THE</div>
<div class="title-bottom">GAME</div>

<div class="diff-row">
<div class="diff active" onclick="setDiff('easy',this)">Easy</div>
<div class="diff" onclick="setDiff('normal',this)">Normal</div>
<div class="diff" onclick="setDiff('hard',this)">Hard</div>
</div>

<button class="start-btn" onclick="start()">START GAME</button>
</div>

<div class="wrapper">
<div class="sidebar" id="sidebar"></div>

<div class="main">

<div class="card" id="game">

<div class="emoji" id="emoji"></div>

<button class="btn" onclick="toggleClue()">Reveal Clue</button>

<div class="clue" id="clue"></div>

<input id="input" placeholder="Type your guess">

<button class="btn submit" onclick="submit()">Submit</button>
<button class="btn skip" onclick="skip()">Skip</button>
<button class="btn back" onclick="back()">Back</button>

</div>

<div id="end" class="end" style="display:none;"></div>

</div>
</div>

<script>

/* 🔥 EXPANDED GAME BANK (30+ GAMES) */
const ALL=[
{emoji:"🍄👨‍🔧🏰",answer:["mario","super mario bros"],clue:"Plumber saves a princess"},
{emoji:"🧱⛏️🌍",answer:["minecraft"],clue:"Build anything, survive anything"},
{emoji:"🧟‍♂️🔫🏚️",answer:["resident evil"],clue:"Zombie outbreak horror series"},
{emoji:"⚔️🐉👑",answer:["skyrim"],clue:"Dragonborn open world RPG"},
{emoji:"🔫🪖🌍",answer:["call of duty"],clue:"Military FPS franchise"},
{emoji:"🎯🔫📦",answer:["fortnite"],clue:"Battle royale + building"},
{emoji:"🪐👽🔫",answer:["halo"],clue:"Master Chief vs Covenant"},
{emoji:"🚗💥🌆",answer:["gta","grand theft auto"],clue:"Open world crime sandbox"},
{emoji:"🧑‍🦹‍♂️🕷️🌆",answer:["spiderman","marvel spiderman"],clue:"Web swinging superhero"},
{emoji:"⚡🐉👦",answer:["pokemon"],clue:"Catch and battle creatures"},
{emoji:"🏹🏹🏹",answer:["zelda"],clue:"Legendary fantasy adventure"},
{emoji:"🏝️🧟‍♀️🔫",answer:["last of us"],clue:"Post apocalypse survival"},
{emoji:"🚀👨‍🚀🌌",answer:["mass effect"],clue:"Space opera RPG"},
{emoji:"🧙‍♂️📜🔥",answer:["witcher","witcher 3"],clue:"Monster hunter Geralt"},
{emoji:"🪓🌲🏚️",answer:["dont starve"],clue:"Survive the wilderness"},
{emoji:"🧩🟦🟥",answer:["tetris"],clue:"Falling block puzzle"},
{emoji:"👻🏚️🔦",answer:["phasmophobia"],clue:"Ghost hunting co-op"},
{emoji:"🏎️💨🏁",answer:["forza"],clue:"Realistic racing sim"},
{emoji:"⚔️🏰🛡️",answer:["dark souls"],clue:"You will die a lot"},
{emoji:"🤖🔫🌆",answer:["cyberpunk","cyberpunk 2077"],clue:"Futuristic dystopia"},
{emoji:"🐺🌲⚔️",answer:["the forest"],clue:"Survival horror island"},
{emoji:"🧟‍♀️🏃‍♂️🏙️",answer:["dying light"],clue:"Parkour zombie survival"},
{emoji:"🎮👾🕹️",answer:["pacman"],clue:"Classic arcade maze game"},
{emoji:"🧙‍♂️🏰✨",answer:["hogwarts legacy"],clue:"Wizarding world RPG"},
{emoji:"🪖🏝️🔥",answer:["far cry"],clue:"Open world chaos shooter"},
{emoji:"🐧❄️⛏️",answer:["subnautica"],clue:"Underwater survival exploration"},
{emoji:"🏹🔥🏜️",answer:["horizon"],clue:"Robot dinosaur world"},
{emoji:"🧟‍♂️🏙️🔪",answer:["dead rising"],clue:"Zombie mall chaos"},
{emoji:"🪐🚀🔫",answer:["destiny"],clue:"Loot shooter space saga"},
{emoji:"🧑‍🌾🌽🚜",answer:["stardew valley"],clue:"Cozy farming life sim"}
];

let q=[],i=0,score=0,status=[],diff="easy";

/* HUB */
function goHub(){
window.location.href="index.html";
}

/* DIFF */
function setDiff(d,el){
diff=d;
document.querySelectorAll(".diff").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
}

/* START */
function start(){
q=[...ALL].sort(()=>Math.random()-0.5);
i=0;score=0;
status=Array(q.length).fill("pending");

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

buildSidebar();
load();
}

/* SIDEBAR */
function buildSidebar(){
let s=document.getElementById("sidebar");
s.innerHTML="";
q.forEach((_,idx)=>{
let d=document.createElement("div");
d.className="dot";
d.innerText=idx+1;
d.onclick=()=>{i=idx;load();};
s.appendChild(d);
});
updateSidebar();
}

function updateSidebar(){
document.querySelectorAll(".dot").forEach((d,idx)=>{
d.className="dot";
if(idx===i) d.classList.add("current");
if(status[idx]==="correct") d.classList.add("correct");
if(status[idx]==="wrong") d.classList.add("wrong");
});
}

/* LOAD */
function load(){
if(i>=q.length) return end();

document.getElementById("emoji").innerText=q[i].emoji;
document.getElementById("input").value="";

document.getElementById("clue").style.display="none";
document.getElementById("clue").innerText=q[i].clue;

updateSidebar();
}

/* CLUE */
function toggleClue(){
let c=document.getElementById("clue");
c.style.display = (c.style.display==="block") ? "none" : "block";
}

/* SUBMIT */
function submit(){
let v=document.getElementById("input").value.toLowerCase();
if(q[i].answer.some(a=>v.includes(a))){
score++;
status[i]="correct";
}else{
status[i]="wrong";
}
i++;
load();
}

/* NAV */
function skip(){i++;load();}
function back(){if(i>0)i--;load();}

/* END */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("end").style.display="block";

document.getElementById("end").innerHTML=`
<div class="big">GAME COMPLETE 🎉</div>
<div class="big-score">${score}/${q.length}</div>

<button class="action-btn primary" onclick="location.reload()">Play Again</button>
`;
}

</script>

</body>
</html>
