<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Game</title>

<style>
:root{
    --primary:#553179;
    --accent:#bedc00;
    --bg:#eae8e5;
    --card:#ffffff;
    --text:#1a1a1a;
    --grey:#d0d0d0;
    --green:#2ecc71;
    --red:#e74c3c;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    background:white;
    padding:12px;
    text-align:center;
    border-bottom:2px solid #ddd;
}

/* LAYOUT */
.wrapper{
    display:flex;
    max-width:1100px;
    margin:auto;
    padding:20px;
    gap:20px;
}

/* SIDEBAR */
.sidebar{
    width:60px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.dot{
    width:44px;
    height:44px;
    border-radius:8px;
    background:var(--grey);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    cursor:pointer;
}

.dot.current{ background:var(--primary); color:white; }
.dot.correct{ background:var(--green); color:white; }
.dot.wrong{ background:var(--red); color:white; }

/* MAIN */
.main{ flex:1; }

/* MENU */
.menu{
    text-align:center;
    margin-top:40px;
}

.title{
    font-size:54px;
    font-weight:900;
}

.title span{
    color:var(--accent);
}

.subtitle{
    opacity:0.7;
    margin-top:5px;
}

/* DIFFICULTY */
.diff-grid{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:25px;
    flex-wrap:wrap;
}

.diff{
    background:white;
    border:2px solid var(--primary);
    padding:14px;
    border-radius:12px;
    width:200px;
    cursor:pointer;
}

.diff.selected{
    background:var(--primary);
    color:white;
}

.start-btn{
    margin-top:25px;
    padding:16px 30px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:var(--accent);
    cursor:pointer;
    font-weight:bold;
}

/* GAME CARD */
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    display:none;
}

.topbar{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:10px;
}

.timer{
    font-weight:bold;
}

/* EMOJI */
.emoji{
    font-size:72px;
    text-align:center;
    margin:20px 0;
    letter-spacing:10px;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* BUTTONS */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
}

.submit{ background:var(--accent); }
.skip{ background:#999; color:white; }
.back{ background:#ddd; }

/* CLUE */
.clue{
    display:none;
    margin-top:10px;
    background:#f4f4f4;
    padding:10px;
    border-radius:8px;
    font-size:14px;
}

/* GAME OVER */
.end{
    text-align:center;
}
</style>
</head>

<body>

<header>
    <img src="https://www.gamesjobsdirect.com/assets/img/default-logo.svg" height="40">
</header>

<!-- MENU -->
<div class="menu" id="menu">

    <div class="title">Guess The <span>Game</span></div>
    <div class="subtitle">Test your gaming knowledge</div>

    <div class="diff-grid">

        <div class="diff selected" onclick="setDiff('easy', this)">
            <h3>Easy</h3>
            <p>No timer</p>
        </div>

        <div class="diff" onclick="setDiff('normal', this)">
            <h3>Normal</h3>
            <p>30 seconds total</p>
        </div>

        <div class="diff" onclick="setDiff('hard', this)">
            <h3>Hard</h3>
            <p>15 seconds total</p>
        </div>

    </div>

    <button class="start-btn" onclick="start()">START GAME</button>

</div>

<!-- GAME -->
<div class="wrapper">

<div class="sidebar" id="sidebar"></div>

<div class="main">

<div class="card" id="game">

<div class="topbar">
    <div id="progress"></div>
    <div class="timer" id="timer"></div>
</div>

<div class="emoji" id="emoji"></div>

<button class="btn" onclick="toggleClue()">Reveal Clue</button>

<div class="clue" id="clue"></div>

<input id="input" placeholder="Type your guess">

<button class="btn submit" onclick="submit()">Submit</button>
<button class="btn skip" onclick="skip()">Skip</button>
<button class="btn back" onclick="back()">Back</button>

</div>

<div id="end" class="end" style="display:none;"></div>

</div>
</div>

<script>

/* GAME DATA */
const ALL=[
{emoji:"🍄👨‍🔧🏰", answer:["super mario bros","mario bros"], clue:"Plumber rescues princess", year:"1985"},
{emoji:"🧱⛏️🌍", answer:["minecraft"], clue:"Build anything, survive night", year:"2011"},
{emoji:"🧟‍♂️🔫🏚️", answer:["resident evil"], clue:"Zombie mansion outbreak", year:"1996"},
{emoji:"⚔️🐉👑", answer:["skyrim","the elder scrolls skyrim"], clue:"You are the Dragonborn", year:"2011"},
{emoji:"🔫🪖🌍", answer:["call of duty"], clue:"Military FPS franchise", year:"2003"},
{emoji:"🎯🔫📦", answer:["fortnite"], clue:"Battle royale building game", year:"2017"},
{emoji:"🪐👽🔫", answer:["halo","halo combat evolved"], clue:"Master Chief vs Covenant", year:"2001"}
];

let questions=[];
let i=0;
let score=0;
let status=[];
let diff="easy";
let timer;
let time=0;

/* DIFF SELECT */
function setDiff(d,el){
diff=d;
document.querySelectorAll(".diff").forEach(x=>x.classList.remove("selected"));
el.classList.add("selected");
}

/* START */
function start(){

questions=[...ALL].sort(()=>Math.random()-0.5).slice(0,10);
i=0; score=0;
status=Array(questions.length).fill("pending");

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

buildSidebar();
load();
startTimer();
}

/* SIDEBAR */
function buildSidebar(){
let s=document.getElementById("sidebar");
s.innerHTML="";
questions.forEach((q,idx)=>{
let d=document.createElement("div");
d.className="dot";
d.innerText=idx+1;
d.onclick=()=>go(idx);
s.appendChild(d);
});
updateSidebar();
}

function updateSidebar(){
document.querySelectorAll(".dot").forEach((d,idx)=>{
d.className="dot";

if(idx===i) d.classList.add("current");
if(status[idx]==="correct") d.classList.add("correct");
if(status[idx]==="wrong") d.classList.add("wrong");
});
}

/* LOAD */
function load(){
if(i>=questions.length) return end();

let q=questions[i];

document.getElementById("emoji").innerText=q.emoji;
document.getElementById("clue").innerHTML=`<b>${q.year}</b><br>${q.clue}`;
document.getElementById("clue").style.display="none";

document.getElementById("input").value="";
document.getElementById("progress").innerText=`${i+1}/${questions.length} | Score: ${score}`;

updateSidebar();
}

/* CLUE */
function toggleClue(){
let c=document.getElementById("clue");
c.style.display=c.style.display==="block"?"none":"block";
}

/* ANSWER CHECK (lenient) */
function match(user,answers){
user=user.toLowerCase().trim();
return answers.some(a=>user.includes(a));
}

/* SUBMIT */
function submit(){

let val=document.getElementById("input").value;
if(match(val,questions[i].answer)){
score++;
status[i]="correct";
}else{
status[i]="wrong";
}

next();
}

/* SKIP */
function skip(){
next();
}

/* BACK */
function back(){
if(i>0) i--;
load();
}

/* NEXT */
function next(){
clearInterval(timer);
i++;
load();
startTimer();
}

/* GO */
function go(x){
i=x;
load();
}

/* TIMER (GLOBAL GAME TIMER) */
function startTimer(){

clearInterval(timer);

if(diff==="easy"){
document.getElementById("timer").innerText="";
return;
}

if(i===0){
time=diff==="normal"?30:15;
}

document.getElementById("timer").innerText=`⏱ ${time}s`;

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText=`⏱ ${time}s`;

if(time<=0){
clearInterval(timer);
gameOver();
}
},1000);
}

/* END */
function end(){
document.getElementById("game").style.display="none";

document.getElementById("end").style.display="block";

document.getElementById("end").innerHTML=`
<h2>Game Complete 🎉</h2>
<p>Score: ${score}/${questions.length}</p>
<button onclick="location.reload()">Play Again</button>
`;
}

/* GAME OVER (TIMER) */
function gameOver(){

document.getElementById("game").style.display="none";

document.getElementById("end").style.display="block";

document.getElementById("end").innerHTML=`
<h2>Time's Up ⏱</h2>
<p>Score: ${score}/${questions.length}</p>

<button onclick="location.reload()">Play Again</button>
<button onclick="alert('We can add answer review screen next')">Reveal Answers</button>
`;
}

</script>

</body>
</html>
